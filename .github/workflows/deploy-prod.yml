name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com/clientify
  IMAGE: registry.digitalocean.com/clientify/emailengine-prod
  MANIFESTS_REPO: contacteitor/clientify-manifiestos-kubernetes
  K8S_CLUSTER: clientify-plus-k8s
  NAMESPACE: emailengine

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build & Push imagen a DO Registry
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
        timeout-minutes: 5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Registry
        run: doctl registry login --expiry-seconds 3600

      - name: Generate version tag
        id: version
        run: |
          VERSION="$(git rev-parse --short HEAD)"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Image version: ${VERSION}"

      - name: Build and push
        timeout-minutes: 25
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE }}:prod-latest
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:prod-latest
          cache-to: type=inline

  # ---------------------------------------------------------------------------
  # Job 2: Aprobación manual antes de desplegar a producción
  # ---------------------------------------------------------------------------
  approve:
    name: Waiting for approval
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://ee-k8s.clientify.net

    steps:
      - name: Approved
        run: echo "Deploy aprobado por ${{ github.actor }}"

  # ---------------------------------------------------------------------------
  # Job 3: Deploy al cluster de producción
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, approve]

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION="$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFESTS_REPO }}
          token: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          path: manifests
        timeout-minutes: 5

      - name: Show current version
        run: |
          echo "Imagen actual en prod:"
          grep "image:" manifests/emailengine/prod/deployment.yaml || true
          echo "Desplegando tag: ${{ steps.version.outputs.VERSION }}"

      - name: Update image tag in manifests
        run: |
          TAG=${{ steps.version.outputs.VERSION }}
          sed -i "s|image: ${{ env.IMAGE }}:[a-zA-Z0-9._-]*|image: ${{ env.IMAGE }}:${TAG}|g" \
            manifests/emailengine/prod/deployment.yaml
          echo "Updated deployment.yaml → tag: ${TAG}"

      - name: Commit and push manifest changes
        run: |
          TAG=${{ steps.version.outputs.VERSION }}
          cd manifests
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add emailengine/prod/deployment.yaml

          if git diff --staged --quiet; then
            echo "No hay cambios para commitear"
          else
            git commit -m "prod(emailengine): deploy ${TAG} from ${{ github.ref_name }}"
            git push
            echo "Manifests actualizados en repo GitOps"
          fi

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.K8S_CLUSTER }}
        timeout-minutes: 3

      - name: Apply manifests
        timeout-minutes: 5
        run: |
          kubectl apply -f manifests/emailengine/prod/secret.yaml
          kubectl apply -f manifests/emailengine/prod/configmap.yaml
          kubectl apply -f manifests/emailengine/prod/deployment.yaml
          kubectl apply -f manifests/emailengine/prod/hpa.yaml

      - name: Wait for rollout
        id: rollout
        timeout-minutes: 10
        run: |
          kubectl rollout status deployment/emailengine \
            -n ${{ env.NAMESPACE }} \
            --timeout=540s

      - name: Health check post-deploy
        timeout-minutes: 5
        run: |
          echo "Verificando salud del servicio..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://ee-k8s.clientify.net/health || echo "000")
            if [ "${STATUS}" = "200" ]; then
              echo "Health check OK (intento ${i}/6) - HTTP ${STATUS}"
              exit 0
            fi
            echo "Intento ${i}/6 falló (HTTP ${STATUS}), esperando 30s..."
            sleep 30
          done
          echo "Health check falló después de 3 minutos"
          exit 1

      - name: Auto-rollback on failure
        if: failure() && steps.rollout.conclusion == 'failure'
        run: |
          echo "Iniciando rollback automático..."
          kubectl rollout undo deployment/emailengine -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/emailengine \
            -n ${{ env.NAMESPACE }} --timeout=300s || true
          echo "Rollback completado"

      - name: Deployment Summary
        if: always()
        run: |
          TAG=${{ steps.version.outputs.VERSION }}
          echo ""
          echo "=========================================="
          if [ "${{ job.status }}" = "success" ]; then
            echo "DEPLOYMENT COMPLETADO"
          else
            echo "DEPLOYMENT FALLIDO (ver logs arriba)"
          fi
          echo "=========================================="
          echo "Namespace:  ${{ env.NAMESPACE }}"
          echo "Branch:     ${{ github.ref_name }}"
          echo "Commit:     ${{ github.sha }}"
          echo "Image tag:  ${TAG}"
          echo "URL:        https://ee-k8s.clientify.net"
          echo ""
          echo "Pods actuales:"
          kubectl get pods -n ${{ env.NAMESPACE }} --no-headers 2>/dev/null || true
          echo "=========================================="
